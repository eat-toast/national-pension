name: Deploy output_html to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages files
        run: |
          if [ ! -d output_html ]; then
            echo "::error::output_html directory was not found."
            exit 1
          fi

          mkdir -p site
          cp -R output_html/. site/

          if [ ! -f site/index.html ]; then
            latest_combined="$(find site -maxdepth 1 -type f -name 'nps_combined_*.html' | sort | tail -n 1)"
            if [ -z "$latest_combined" ]; then
              latest_combined="$(find site -maxdepth 1 -type f -name '*.html' | sort | tail -n 1)"
            fi
            if [ -z "$latest_combined" ]; then
              echo "::error::No HTML file found in output_html."
              exit 1
            fi
            cp "$latest_combined" site/index.html
          fi

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
