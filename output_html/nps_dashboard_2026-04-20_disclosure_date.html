<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>국민연금 국내주식 변동 대시보드</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #18202b;
      --muted: #667085;
      --line: #d9dee7;
      --teal: #007c89;
      --plum: #6d3a8f;
      --coral: #d55b4a;
      --amber: #b7791f;
      --green: #2f7d52;
      --blue: #2d5b9a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .wrap {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      padding: 22px 0 18px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 760;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
      font-size: 13px;
    }
    button {
      cursor: pointer;
      font-weight: 650;
    }
    main {
      padding: 18px 0 36px;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .metric {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }
    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .metric-value {
      margin-top: 9px;
      font-size: 26px;
      font-weight: 780;
      white-space: nowrap;
    }
    .metric-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(360px, 0.65fr);
      gap: 14px;
      align-items: start;
    }
    .grid > *, .split > * {
      min-width: 0;
    }
    .section {
      border-top: 1px solid var(--line);
      padding: 16px 0 0;
      margin-top: 2px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 10px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
    }
    .chart-surface, .table-surface {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: auto;
      max-width: 100%;
    }
    .chart {
      min-height: 290px;
      padding: 14px 14px 10px;
    }
    .bars {
      display: grid;
      grid-template-columns: repeat(var(--bar-count), minmax(2px, 1fr));
      align-items: end;
      gap: 3px;
      height: 220px;
      padding: 8px 4px 0;
      border-bottom: 1px solid var(--line);
    }
    .bar {
      min-height: 1px;
      border-radius: 4px 4px 0 0;
      background: var(--teal);
      position: relative;
    }
    .bar.negative { background: var(--coral); }
    .chart-legend {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 12px;
      padding-top: 10px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #baselineTable, #snapshotTable {
      min-width: 520px;
    }
    #detailTable, #searchTable {
      min-width: 980px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #e9edf3;
      vertical-align: middle;
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      background: #fafbfc;
      white-space: nowrap;
    }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover { background: #f8fafc; }
    a.report-link {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }
    a.report-link:hover { text-decoration: underline; }
    .delta-up { color: var(--green); font-weight: 700; }
    .delta-down { color: var(--coral); font-weight: 700; }
    .rank {
      width: 30px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .company {
      font-weight: 700;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .company-sub {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }
    .mini-bars {
      display: grid;
      gap: 8px;
      padding: 14px;
    }
    .mini-row {
      display: grid;
      grid-template-columns: minmax(96px, 150px) 1fr 76px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 17px;
      height: 17px;
      margin-left: 6px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: var(--surface);
      font-size: 11px;
      font-weight: 800;
      cursor: help;
    }
    .info-tip::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      width: 230px;
      padding: 8px 10px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 600;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 5;
    }
    .info-tip:hover::after, .info-tip:focus::after {
      opacity: 1;
    }
    .track {
      height: 8px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }
    .track.diverging {
      position: relative;
      overflow: visible;
      background: #eef2f6;
    }
    .track.diverging::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -3px;
      width: 1px;
      height: 14px;
      background: #b8c0cc;
    }
    .fill {
      height: 100%;
      width: var(--w);
      background: var(--plum);
    }
    .fill.down { background: var(--coral); }
    .fill.up { background: var(--green); }
    .fill.diverging {
      position: absolute;
      top: 0;
      width: var(--w);
      z-index: 1;
    }
    .fill.diverging.up {
      left: 50%;
      border-radius: 0 999px 999px 0;
    }
    .fill.diverging.down {
      right: 50%;
      border-radius: 999px 0 0 999px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tab[aria-pressed="true"] {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }
    .search-panel {
      display: grid;
      grid-template-columns: minmax(220px, 320px) 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .search-input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 12px;
      font: inherit;
      background: var(--surface);
    }
    .search-summary {
      color: var(--muted);
      font-size: 13px;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid, .split { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .wrap { width: min(100vw - 24px, 1440px); }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search-panel { grid-template-columns: 1fr; }
      .metric-value { font-size: 21px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
      .company { max-width: 140px; }
      .mini-row { grid-template-columns: 96px 1fr 64px; }
    }
  </style>
</head>

    </section>

"companyCount":40,"ownershipSum":2.5173999999999994,"ownershipDiffSum":0.21720000000000006,"netDirection":"순매도"},{"sectorName":"헬스케어","companyCount":25,"ownershipSum":1.3916000000000002,"ownershipDiffSum":-0.14689999999999995,"netDirection":"순매수"},{"sectorName":"유통","companyCount":18,"ownershipSum":1.3145000000000002,"ownershipDiffSum":0.1474,"netDirection":"순매도"},{"sectorName":"전문서비스","companyCount":17,"ownershipSum":1.1443000000000003,"ownershipDiffSum":0.09280000000000005,"netDirection":"순매도"},{"sectorName":"미디어","companyCount":17,"ownershipSum":1.0522,"ownershipDiffSum":0.1277,"netDirection":"순매도"},{"sectorName":"음식료","companyCount":11,"ownershipSum":0.7487000000000001,"ownershipDiffSum":-0.1485,"netDirection":"순매도"},{"sectorName":"자동차","companyCount":8,"ownershipSum":0.6324000000000001,"ownershipDiffSum":0.10830000000000002,"netDirection":"순매수"},{"sectorName":"운송","companyCount":8,"ownershipSum":0.5296,"ownershipDiffSum":-0.060300000000000034,"netDirection":"순매도"},{"sectorName":"건설","companyCount":5,"ownershipSum":0.4528,"ownershipDiffSum":-0.0102,"netDirection":"순매수"}]};
    const fmt = new Intl.NumberFormat("ko-KR");
    const pct = (v, digits = 2) => v == null ? "" : `${(v * 100).toFixed(digits)}%`;
    const pp = v => v == null ? "" : `${(v * 100).toFixed(2)}%p`;
    const signedPp = v => v == null ? "" : `${v > 0 ? "+" : ""}${(v * 100).toFixed(2)}%p`;
    const shares = v => v == null ? "" : fmt.format(Math.round(v));
    const money = v => v == null ? "" : fmt.format(Math.round(v));
    const won = v => v == null ? "" : `${fmt.format(Math.round(v))}원`;
    const signed = v => v == null ? "" : `${v > 0 ? "+" : ""}${shares(v)}`;
    const cls = v => v > 0 ? "delta-up" : v < 0 ? "delta-down" : "";
    const norm = value => String(value || "").toLowerCase().replace(/\s+/g, "").replaceAll("(주)", "").replaceAll("㈜", "").replace(/보통주$|우선주$/g, "");

    function cell(value, className = "") {
      return `<td class="${className}">${value ?? ""}</td>`;
    }

    function reportLink(row) {
      if (!row.sourceUrl) return row.changeReason;
      return `<a class="report-link" href="${row.sourceUrl}" target="_blank" rel="noopener noreferrer">${row.changeReason || "공시 보기"}</a>`;
    }

    function renderKpis() {
      document.getElementById("meta").textContent =
        `${DASHBOARD_DATA.meta.baselineYear}년 말 엑셀 기준 | ${DASHBOARD_DATA.meta.basisLabel} | 기준일 ${DASHBOARD_DATA.meta.asOfDate} | 생성 ${DASHBOARD_DATA.meta.generatedAt}`;
      document.getElementById("kpis").innerHTML = DASHBOARD_DATA.kpis.map(item => `
        <article class="metric">
          <div class="metric-label">${item.label}</div>
          <div class="metric-value">${item.value}</div>
          <div class="metric-detail">${item.detail}</div>
        </article>
      `).join("");
    }

    function renderTrend(metric = "eventCount") {
      const rows = DASHBOARD_DATA.dailySeries;
      const isOwnershipMetric = metric.toLowerCase().includes("ownership");
      const max = Math.max(isOwnershipMetric ? 0.0001 : 1, ...rows.map(row => Math.abs(row[metric] || 0)));
      const labels = rows.length ? `${rows[0].date} - ${rows[rows.length - 1].date}` : "데이터 없음";
      const formatMetric = isOwnershipMetric ? signedPp : shares;
      document.getElementById("trendChart").innerHTML = `
        <div class="bars" style="--bar-count:${Math.max(rows.length, 1)}">
          ${rows.map(row => {
            const value = row[metric] || 0;
            const h = Math.max(1, Math.round(Math.abs(value) / max * 100));
            return `<div class="bar ${value < 0 ? "negative" : ""}" style="height:${h}%" title="${row.date}: ${formatMetric(value)}"></div>`;
          }).join("")}
        </div>
        <div class="chart-legend"><span>${labels}</span><span>최대 ${formatMetric(max)}</span></div>
      `;
    }

    function renderTable(id, headers, rows) {
      document.getElementById(id).innerHTML = `
        <thead><tr>${headers.map(h => `<th class="${h.className || ""}">${h.label}</th>`).join("")}</tr></thead>
        <tbody>${rows.join("")}</tbody>
      `;
    }

    function renderBaseline() {
      renderTable("baselineTable",
        [{label:"#"}, {label:"종목"}, {label:"평가액", className:"num"}, {label:"지분율", className:"num"}, {label:"추정 평가단가", className:"num"}, {label:"최신 대비", className:"num"}],
        DASHBOARD_DATA.baselineTop.slice(0, 12).map(row => `<tr>
          ${cell(row.rank, "rank")}${cell(row.companyName, "company")}${cell(money(row.marketValue), "num")}${cell(pct(row.ownership), "num")}${cell(won(row.estimatedValuationUnitPrice), "num")}${cell(signedPp(row.currentOwnershipDiff), `num ${cls(row.currentOwnershipDiff)}`)}
        </tr>`)
      );
      renderTable("snapshotTable",
        [{label:"#"}, {label:"종목"}, {label:"지분율", className:"num"}, {label:"추정 평가단가", className:"num"}, {label:"지분율 변동", className:"num"}, {label:"수량 변동", className:"num"}],
        DASHBOARD_DATA.snapshotTop.slice(0, 12).map((row, index) => `<tr>
          ${cell(index + 1, "rank")}${cell(row.companyName, "company")}${cell(pct(row.ownership), "num")}${cell(won(row.estimatedValuationUnitPrice), "num")}${cell(signedPp(row.lastOwnershipDelta), `num ${cls(row.lastOwnershipDelta)}`)}${cell(signed(row.lastDeltaShares), `num ${cls(row.lastDeltaShares)}`)}
        </tr>`)
      );
    }

    function renderMiniBars(id, rows, valueKey, labelKey, formatValue, limit = 10) {
      const shown = rows.slice(0, limit);
      const max = Math.max(1, ...shown.map(row => Math.abs(row[valueKey] || 0)));
      document.getElementById(id).innerHTML = shown.map(row => {
        const value = row[valueKey] || 0;
        const width = Math.max(2, Math.round(Math.abs(value) / max * 100));
        const direction = value < 0 ? "down" : "up";
        return `<div class="mini-row">
          <div class="company" title="${row[labelKey]}">${row[labelKey]}</div>
          <div class="track"><div class="fill ${direction}" style="--w:${width}%"></div></div>
          <div class="num ${cls(value)}">${formatValue(value)}</div>
        </div>`;
      }).join("");
    }

    function renderDivergingMiniBars(id, rows, valueKey, labelKey, formatValue, limit = 10, scaleMax = null) {
      const shown = rows.slice(0, limit);
      if (!shown.length) {
        document.getElementById(id).innerHTML = `<div class="empty">표시할 변동이 없습니다.</div>`;
        return;
      }
      const max = Math.max(0.0001, Number(scaleMax) || 0, ...shown.map(row => Math.abs(Number(row[valueKey] || 0))));
      document.getElementById(id).innerHTML = shown.map(row => {
        const value = Number(row[valueKey] || 0);
        const width = Math.max(3, Math.min(48, Math.round(Math.abs(value) / max * 48)));
        const direction = value < 0 ? "down" : "up";
        return `<div class="mini-row">
          <div class="company" title="${row[labelKey]}">${row[labelKey]}</div>
          <div class="track diverging"><div class="fill diverging ${direction}" style="--w:${width}%"></div></div>
          <div class="num ${cls(value)}">${formatValue(value)}</div>
        </div>`;
      }).join("");
    }

    function renderChangeBars() {
      const shown = DASHBOARD_DATA.largestChanges.slice(0, 10);
      const max = Math.max(1, ...shown.map(row => Math.abs(row.deltaShares || 0)));
      document.getElementById("changeBars").innerHTML = shown.map(row => {
        const value = row.deltaShares || 0;
        const width = Math.max(2, Math.round(Math.abs(value) / max * 100));
        const direction = value < 0 ? "down" : "up";
        const date = row.disclosedAt || row.effectiveDate || "";
        return `<div class="mini-row">
          <div class="company" title="${row.companyName} ${date}">
            ${row.companyName}<span class="company-sub">${date}</span>
          </div>
          <div class="track"><div class="fill ${direction}" style="--w:${width}%"></div></div>
          <div class="num ${cls(value)}">${signed(value)}<br>${signedPp(row.ownershipDelta)}</div>
        </div>`;
      }).join("");
    }

    function renderDetails(kind = "events") {
      if (kind === "sectors") {
        renderTable("detailTable",
          [{label:"섹터"}, {label:"종목 수", className:"num"}, {label:"지분율 합계", className:"num"}, {label:"지분율 변동", className:"num"}],
          DASHBOARD_DATA.sectorRows.map(row => `<tr>
            ${cell(row.sectorName)}${cell(fmt.format(row.companyCount), "num")}${cell(pct(row.ownershipSum), "num")}${cell(signedPp(row.ownershipDiffSum), `num ${cls(row.ownershipDiffSum)}`)}
          </tr>`)
        );
        return;
      }
      renderTable("detailTable",
        [{label:"공시일"}, {label:"종목"}, {label:"코드"}, {label:"수량 증감", className:"num"}, {label:"지분율 증감", className:"num"}, {label:"변동 후 수량", className:"num"}, {label:"지분율", className:"num"}, {label:"사유"}],
        DASHBOARD_DATA.latestEvents.map(row => `<tr>
          ${cell(row.disclosedAt)}${cell(row.companyName, "company")}${cell(row.ticker)}${cell(signed(row.deltaShares), `num ${cls(row.deltaShares)}`)}${cell(signedPp(row.ownershipDelta), `num ${cls(row.ownershipDelta)}`)}${cell(shares(row.sharesAfter), "num")}${cell(pct(row.ownershipAfter), "num")}${cell(reportLink(row))}
        </tr>`)
      );
    }

    function renderSearch(query = "") {
      const q = norm(query);
      const summary = document.getElementById("searchSummary");
      if (!q) {
        summary.textContent = "";
        document.getElementById("searchTable").innerHTML = `<tbody><tr><td class="empty">종목명을 입력하면 2024 엑셀 기준점과 공시 DB 변동 내역이 이어서 표시됩니다.</td></tr></tbody>`;
        return;
      }
      const baseline = DASHBOARD_DATA.baselineRows
        .filter(row => norm(row.companyName).includes(q))
        .map(row => ({
          date: `${DASHBOARD_DATA.meta.baselineYear}-12-31`,
          source: "기준 엑셀",
          companyName: row.companyName,
          ticker: "",
          sharesAfter: null,
          deltaShares: null,
          ownershipAfter: row.ownership,
          ownershipDelta: null,
          reason: `평가액 ${money(row.marketValue)}억원${row.estimatedValuationUnitPrice ? ` / 추정 평가단가 ${won(row.estimatedValuationUnitPrice)}` : ""}`
        }));
      const events = DASHBOARD_DATA.eventHistory.filter(row =>
        norm(row.companyName).includes(q) || norm(row.ticker).includes(q)
      );
      const rows = [...baseline, ...events].sort((a, b) =>
        `${a.date || a.disclosedAt || ""}${a.source}`.localeCompare(`${b.date || b.disclosedAt || ""}${b.source}`)
      );
      summary.textContent = `${rows.length}건`;
      if (!rows.length) {
        document.getElementById("searchTable").innerHTML = `<tbody><tr><td class="empty">검색 결과가 없습니다.</td></tr></tbody>`;
        return;
      }
      renderTable("searchTable",
        [{label:"일자"}, {label:"출처"}, {label:"종목"}, {label:"코드"}, {label:"수량 증감", className:"num"}, {label:"지분율 증감", className:"num"}, {label:"보유수량", className:"num"}, {label:"지분율", className:"num"}, {label:"내용"}],
        rows.map(row => `<tr>
          ${cell(row.date || row.disclosedAt)}${cell(row.source || "공시 DB")}${cell(row.companyName, "company")}${cell(row.ticker)}${cell(signed(row.deltaShares), `num ${cls(row.deltaShares)}`)}${cell(signedPp(row.ownershipDelta), `num ${cls(row.ownershipDelta)}`)}${cell(shares(row.sharesAfter), "num")}${cell(pct(row.ownershipAfter), "num")}${cell(row.reason || row.changeReason)}
        </tr>`)
      );
    }

    renderKpis();
    renderTrend();
    renderBaseline();
    renderChangeBars();
    const ownershipComparedRows = DASHBOARD_DATA.ownershipChanges.filter(row => Number(row.ownershipDiff || 0) !== 0);
    const ownershipScaleMax = Math.max(0.0001, ...ownershipComparedRows.map(row => Math.abs(Number(row.ownershipDiff || 0))));
    renderDivergingMiniBars(
      "ownershipUpBars",
      ownershipComparedRows.filter(row => Number(row.ownershipDiff || 0) > 0),
      "ownershipDiff",
      "companyName",
      signedPp,
      8,
      ownershipScaleMax
    );
    renderDivergingMiniBars(
      "ownershipDownBars",
      ownershipComparedRows.filter(row => Number(row.ownershipDiff || 0) < 0),
      "ownershipDiff",
      "companyName",
      signedPp,
      8,
      ownershipScaleMax
    );
    renderDetails();
    renderSearch();

    document.getElementById("trendMetric").addEventListener("change", event => renderTrend(event.target.value));
    document.getElementById("stockSearch").addEventListener("input", event => renderSearch(event.target.value));
    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.setAttribute("aria-pressed", "false"));
        button.setAttribute("aria-pressed", "true");
        renderDetails(button.dataset.table);
      });
    });
    document.getElementById("downloadJson").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(DASHBOARD_DATA, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `nps-dashboard-${DASHBOARD_DATA.meta.asOfDate}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
