<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>국민연금 국내주식 변동 대시보드</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #18202b;
      --muted: #667085;
      --line: #d9dee7;
      --teal: #007c89;
      --plum: #6d3a8f;
      --coral: #d55b4a;
      --amber: #b7791f;
      --green: #2f7d52;
      --blue: #2d5b9a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .wrap {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      padding: 22px 0 18px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 760;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
      font-size: 13px;
    }
    button {
      cursor: pointer;
      font-weight: 650;
    }
    main {
      padding: 18px 0 36px;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .metric {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }
    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .metric-value {
      margin-top: 9px;
      font-size: 26px;
      font-weight: 780;
      white-space: nowrap;
    }
    .metric-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(360px, 0.65fr);
      gap: 14px;
      align-items: start;
    }
    .section {
      border-top: 1px solid var(--line);
      padding: 16px 0 0;
      margin-top: 2px;
    }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 10px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
    }
    .chart-surface, .table-surface {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }
    .chart {
      min-height: 290px;
      padding: 14px 14px 10px;
    }
    .bars {
      display: grid;
      grid-template-columns: repeat(var(--bar-count), minmax(2px, 1fr));
      align-items: end;
      gap: 3px;
      height: 220px;
      padding: 8px 4px 0;
      border-bottom: 1px solid var(--line);
    }
    .bar {
      min-height: 1px;
      border-radius: 4px 4px 0 0;
      background: var(--teal);
      position: relative;
    }
    .bar.negative { background: var(--coral); }
    .chart-legend {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 12px;
      padding-top: 10px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #e9edf3;
      vertical-align: middle;
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      background: #fafbfc;
      white-space: nowrap;
    }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover { background: #f8fafc; }
    .delta-up { color: var(--green); font-weight: 700; }
    .delta-down { color: var(--coral); font-weight: 700; }
    .rank {
      width: 30px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .company {
      font-weight: 700;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-bars {
      display: grid;
      gap: 8px;
      padding: 14px;
    }
    .mini-row {
      display: grid;
      grid-template-columns: minmax(96px, 150px) 1fr 76px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    .track {
      height: 8px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: var(--w);
      background: var(--plum);
    }
    .fill.down { background: var(--coral); }
    .fill.up { background: var(--green); }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tab[aria-pressed="true"] {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }
    @media (max-width: 1100px) {
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid, .split { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .wrap { width: min(100vw - 24px, 1440px); }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { justify-content: flex-start; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric-value { font-size: 21px; }
      table { font-size: 12px; }
      th, td { padding: 8px; }
      .company { max-width: 140px; }
      .mini-row { grid-template-columns: 96px 1fr 64px; }
    }
  </style>
</head>

    const fmt = new Intl.NumberFormat("ko-KR");
    const pct = (v, digits = 2) => v == null ? "" : `${(v * 100).toFixed(digits)}%`;
    const pp = v => v == null ? "" : `${(v * 100).toFixed(2)}%p`;
    const shares = v => v == null ? "" : fmt.format(Math.round(v));
    const money = v => v == null ? "" : fmt.format(Math.round(v));
    const signed = v => v == null ? "" : `${v > 0 ? "+" : ""}${shares(v)}`;
    const cls = v => v > 0 ? "delta-up" : v < 0 ? "delta-down" : "";

    function cell(value, className = "") {
      return `<td class="${className}">${value ?? ""}</td>`;
    }

    function renderKpis() {
      document.getElementById("meta").textContent =
        `${DASHBOARD_DATA.meta.baselineYear}년 말 엑셀 기준 | ${DASHBOARD_DATA.meta.basisLabel} | 기준일 ${DASHBOARD_DATA.meta.asOfDate} | 생성 ${DASHBOARD_DATA.meta.generatedAt}`;
      document.getElementById("kpis").innerHTML = DASHBOARD_DATA.kpis.map(item => `
        <article class="metric">
          <div class="metric-label">${item.label}</div>
          <div class="metric-value">${item.value}</div>
          <div class="metric-detail">${item.detail}</div>
        </article>
      `).join("");
    }

    function renderTrend(metric = "eventCount") {
      const rows = DASHBOARD_DATA.dailySeries;
      const max = Math.max(1, ...rows.map(row => Math.abs(row[metric] || 0)));
      const labels = rows.length ? `${rows[0].date} - ${rows[rows.length - 1].date}` : "데이터 없음";
      document.getElementById("trendChart").innerHTML = `
        <div class="bars" style="--bar-count:${Math.max(rows.length, 1)}">
          ${rows.map(row => {
            const value = row[metric] || 0;
            const h = Math.max(1, Math.round(Math.abs(value) / max * 100));
            return `<div class="bar ${value < 0 ? "negative" : ""}" style="height:${h}%" title="${row.date}: ${shares(value)}"></div>`;
          }).join("")}
        </div>
        <div class="chart-legend"><span>${labels}</span><span>최대 ${shares(max)}</span></div>
      `;
    }

    function renderTable(id, headers, rows) {
      document.getElementById(id).innerHTML = `
        <thead><tr>${headers.map(h => `<th class="${h.className || ""}">${h.label}</th>`).join("")}</tr></thead>
        <tbody>${rows.join("")}</tbody>
      `;
    }

    function renderBaseline() {
      renderTable("baselineTable",
        [{label:"#"}, {label:"종목"}, {label:"평가액", className:"num"}, {label:"비중", className:"num"}, {label:"지분율", className:"num"}],
        DASHBOARD_DATA.baselineTop.slice(0, 12).map(row => `<tr>
          ${cell(row.rank, "rank")}${cell(row.companyName, "company")}${cell(money(row.marketValue), "num")}${cell(pct(row.assetWeight), "num")}${cell(pct(row.ownership), "num")}
        </tr>`)
      );
      renderTable("snapshotTable",
        [{label:"#"}, {label:"종목"}, {label:"코드"}, {label:"지분율", className:"num"}, {label:"최근 변동", className:"num"}],
        DASHBOARD_DATA.snapshotTop.slice(0, 12).map((row, index) => `<tr>
          ${cell(index + 1, "rank")}${cell(row.companyName, "company")}${cell(row.ticker)}${cell(pct(row.ownership), "num")}${cell(signed(row.lastDeltaShares), `num ${cls(row.lastDeltaShares)}`)}
        </tr>`)
      );
    }

    function renderMiniBars(id, rows, valueKey, labelKey, formatValue, limit = 10) {
      const shown = rows.slice(0, limit);
      const max = Math.max(1, ...shown.map(row => Math.abs(row[valueKey] || 0)));
      document.getElementById(id).innerHTML = shown.map(row => {
        const value = row[valueKey] || 0;
        const width = Math.max(2, Math.round(Math.abs(value) / max * 100));
        const direction = value < 0 ? "down" : "up";
        return `<div class="mini-row">
          <div class="company" title="${row[labelKey]}">${row[labelKey]}</div>
          <div class="track"><div class="fill ${direction}" style="--w:${width}%"></div></div>
          <div class="num ${cls(value)}">${formatValue(value)}</div>
        </div>`;
      }).join("");
    }

    function renderDetails(kind = "events") {
      if (kind === "sectors") {
        renderTable("detailTable",
          [{label:"섹터"}, {label:"종목 수", className:"num"}, {label:"지분율 합계", className:"num"}, {label:"방향"}],
          DASHBOARD_DATA.sectorRows.map(row => `<tr>
            ${cell(row.sectorName)}${cell(fmt.format(row.companyCount), "num")}${cell(pct(row.ownershipSum), "num")}${cell(row.netDirection)}
          </tr>`)
        );
        return;
      }
      renderTable("detailTable",
        [{label:"공시일"}, {label:"종목"}, {label:"코드"}, {label:"증감수량", className:"num"}, {label:"변동 후"}, {label:"지분율", className:"num"}, {label:"사유"}],
        DASHBOARD_DATA.latestEvents.map(row => `<tr>
          ${cell(row.disclosedAt)}${cell(row.companyName, "company")}${cell(row.ticker)}${cell(signed(row.deltaShares), `num ${cls(row.deltaShares)}`)}${cell(shares(row.sharesAfter), "num")}${cell(pct(row.ownershipAfter), "num")}${cell(row.changeReason)}
        </tr>`)
      );
    }

    renderKpis();
    renderTrend();
    renderBaseline();
    renderMiniBars("changeBars", DASHBOARD_DATA.largestChanges, "deltaShares", "companyName", signed);
    renderMiniBars("ownershipBars", DASHBOARD_DATA.ownershipChanges, "ownershipDiff", "companyName", pp);
    renderDetails();

    document.getElementById("trendMetric").addEventListener("change", event => renderTrend(event.target.value));
    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.setAttribute("aria-pressed", "false"));
        button.setAttribute("aria-pressed", "true");
        renderDetails(button.dataset.table);
      });
    });
    document.getElementById("downloadJson").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(DASHBOARD_DATA, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `nps-dashboard-${DASHBOARD_DATA.meta.asOfDate}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>
